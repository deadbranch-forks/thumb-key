name: Build signed APK

# Manually-triggered signed release APK build.
# Trigger from the Actions tab -> "Build signed APK" -> "Run workflow".
#
# Requires these repository secrets (Settings -> Secrets and variables -> Actions):
#   RELEASE_KEYSTORE_BASE64  base64-encoded keystore (.jks)
#   RELEASE_STORE_PASSWORD   keystore password
#   RELEASE_KEY_ALIAS        key alias
#   RELEASE_KEY_PASSWORD     key password
# See docs/SIGNED_APK_BUILD.md for setup details.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Build signed release APK
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -PRELEASE_STORE_FILE="$RUNNER_TEMP/release.jks" \
            -PRELEASE_STORE_PASSWORD="$RELEASE_STORE_PASSWORD" \
            -PRELEASE_KEY_ALIAS="$RELEASE_KEY_ALIAS" \
            -PRELEASE_KEY_PASSWORD="$RELEASE_KEY_PASSWORD"

      - name: Verify APK signature
        run: |
          BUILD_TOOLS_DIR="$(find "$ANDROID_HOME/build-tools" -maxdepth 1 -type d | sort -V | tail -n 1)"
          "$BUILD_TOOLS_DIR/apksigner" verify --print-certs \
            app/build/outputs/apk/release/app-release.apk

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: thumbkey-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
